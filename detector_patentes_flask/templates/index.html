<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detector de Patentes</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    .container{
      display:flex;
      min-height:100vh;
    }

    .video{
      flex:2;
      padding:20px;
    }

    .panel{
      flex:1;
      background:#1e293b;
      padding:20px;
      overflow-y:auto;
      box-shadow:-2px 0 10px rgba(0,0,0,0.25);
    }

    h1,h2{
      margin-top:0;
    }

    .stream{
      width:100%;
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.08);
    }

    .patente{
      background:#334155;
      padding:12px;
      margin-bottom:10px;
      border-radius:8px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      letter-spacing:2px;
    }

    .nota{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video">
      <h1>Detector de Patentes</h1>
      <img class="stream" src="{{ url_for('video') }}" alt="Video">
    </div>

    <div class="panel">
      <h2>Patentes detectadas</h2>
      <div class="nota">
        Se muestran solo lecturas confirmadas.
      </div>
      <div id="lista"></div>
    </div>
  </div>

  <script>
    async function actualizarPatentes() {
      const res = await fetch('/patentes');
      const data = await res.json();

      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      [...data].reverse().forEach(p => {
        const div = document.createElement('div');
        div.className = 'patente';
        div.textContent = p;
        lista.appendChild(div);
      });
    }

    setInterval(actualizarPatentes, 1000);
    actualizarPatentes();
  </script>
</body>
</html>
